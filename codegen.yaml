# codegen.yaml – Configuration for the test code generator.

# Core settings
default_framework: playwright        # Options: playwright, cypress, selenium
feature_dir: features                  # Relative path to feature files
output_dir: generated_tests            # Base output directory
framework_output_map:                  # Sub‑folders per framework
  playwright: playwright
  cypress: cypress
  selenium: selenium
verbose: false
dry_run: false

# Quality‑related settings
quality:
  # Enable/disable advanced features
  use_page_objects: true               # Generate Page Object classes
  generate_step_defs: true             # Generate reusable step functions
  selector_strategy: "data-testid"     # Preferred selector: "data-testid", "id", "css", "auto"
  add_explicit_waits: true             # Add `waitForSelector` before interactions
  enable_scenario_outlines: true       # Support Scenario Outline with Examples
  run_formatter: false                 # Run code formatter after generation
  formatter_tool: "prettier"           # "prettier", "ruff", or null for auto‑detect
  run_linter: false                    # Run linter after generation (optional)
  linter_tool: null                    # "eslint", "ruff", or null for auto‑detect
  page_object_dir: "pages"             # Sub‑folder for Page Object files
  step_def_dir: "steps"                # Sub‑folder for step definition files
  enable_visual_testing: false          # Add visual snapshot assertions
  visual_snapshot_dir: "visual-snapshots"  # Directory to store baseline images
  output_templates: false              # Use Jinja2 templates (advanced)
  wait_timeout: 10000                  # Default wait timeout in milliseconds
  retry_count: 2                       # Retry attempts for flaky tests