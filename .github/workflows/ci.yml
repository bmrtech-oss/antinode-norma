name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    name: Test on Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install -r requirements-dev.txt

      - name: Check unused imports with Ruff
        run: |
          python -m ruff check . --select F401

      - name: Check formatting with Ruff
        run: |
          python -m ruff check . --select I,E,W,F

      - name: Lint with Ruff
        run: |
          python -m ruff check antinode_norma/ tests/ --select E9,F63,F7,F82 --show-source --statistics
          python -m ruff check antinode_norma/ tests/ --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Check formatting with Ruff
        run: |
          python -m ruff check . --select I,E,W,F

      - name: Run unit tests (no integration)
        run: |
          pytest -m "not integration" --cov=antinode_norma --cov-report=xml --cov-report=term

      - name: Upload coverage to Codecov (optional)
        uses: codecov/codecov-action@v7
        if: github.event_name == 'push' && matrix.python-version == '3.11'
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: ./coverage.xml
          fail_ci_if_error: false

  codegen:
    name: Codegen validation
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install -r requirements-dev.txt

      - name: Validate feature generation
        run: |
          mkdir -p generated_tests_ci
          for f in features/login.feature features/reset_my_password.feature; do
            python -m antinode_norma.codegen.cli.commands generate -f "$f" -o generated_tests_ci -fw playwright
          done

  integration:
    name: Integration tests
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install -r requirements-dev.txt

      - name: Run integration tests
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          pytest -m "integration or external_integration" --cov=antinode_norma --cov-report=xml --cov-report=term

      - name: Upload coverage (integration) to Codecov
        if: env.OPENROUTER_API_KEY != '' && github.event_name == 'push'
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: ./coverage.xml
          fail_ci_if_error: false