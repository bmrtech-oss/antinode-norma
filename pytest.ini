[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = --cov=antinode_norma --cov-report=term-missing
markers =
    integration: marks integration-level tests that exercise workflows or internal subsystems (deselect with '-m "not integration"')
    external_integration: marks tests that require live LLM provider credentials and are skipped without an API key
    slow: marks slow tests
